name: Build

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
  workflow_dispatch:

defaults:
  run:
    shell: bash

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }}, Py${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest ]
        python-version: [ "3.12", "3.13" ]
    runs-on: ${{ matrix.os }}
    env:
      PYTHONIOENCODING: "utf-8"
      PYTHONUTF8: "1"

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: setup.py

      - name: 📦 Setup Virtualenv
        run: |
          python -m venv venv
          if [ "$RUNNER_OS" == "Windows" ]; then
            echo "PYTHON_EXEC=$(pwd)/venv/Scripts/python.exe" >> $GITHUB_ENV
          else
            echo "PYTHON_EXEC=$(pwd)/venv/bin/python" >> $GITHUB_ENV
          fi

      - name: 🛠️ Install Deps
        run: |
          $PYTHON_EXEC -m pip install -q --upgrade pip setuptools wheel Cython pytest
          [ -f requirements.txt ] && $PYTHON_EXEC -m pip install -r requirements.txt || true

      - name: 📦 Build
        run: |
          $PYTHON_EXEC setup.py bdist_wheel

      - name: ⬆️ Upload
        uses: actions/upload-artifact@v6
        with:
          name: build-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*
          retention-days: 3

  package-and-release:
    name: Package & Release
    needs: build
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      S3_BUCKET: ${{ vars.S3_BUCKET || '' }}
      S3_ENDPOINT: ${{ vars.S3_ENDPOINT || '' }}
      S3_PREFIX: ${{ vars.S3_PREFIX || 'builds' }}
      AWS_DEFAULT_REGION: ${{ vars.S3_REGION || 'auto' }}

    steps:
      - name: 📥 Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: collected
          merge-multiple: true

      - name: 🚀 S3/R2 Upload
        if: ${{ env.AWS_ACCESS_KEY_ID && env.S3_BUCKET && startsWith(github.ref, 'refs/tags/v') }}
        run: |
          CLEAN_PREFIX=$(python3 -c "import os; print(os.getenv('S3_PREFIX', '').strip('/'))")
          CLEAN_BUCKET=$(python3 -c "import os; print(os.getenv('S3_BUCKET', '').strip('/'))")
          aws s3 cp collected/ s3://${CLEAN_BUCKET}/${CLEAN_PREFIX:-builds}/ \
            --recursive \
            --exclude "*" \
            --include "*.whl" \
            --endpoint-url ${{ env.S3_ENDPOINT }}

      - name: 📦 Pack & Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build"
          body: "Automated build. Updated: ${{ github.event.head_commit.timestamp }}"
          prerelease: true
          files: collected/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ⬆️ GitHub Package
        run: |
          mkdir -p packaged
          zip -rj packaged/${{ github.event.repository.name }}-all-builds.zip collected/

      - name: ⬆️ Upload to GitHub
        uses: actions/upload-artifact@v6
        with:
          name: ${{ github.event.repository.name }}-all-builds
          path: packaged/
          retention-days: 3
